<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="evm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7ec8ff"/>
      <stop offset="100%" style="stop-color:#4a9eff"/>
    </linearGradient>
    <linearGradient id="pvm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c47eff"/>
      <stop offset="100%" style="stop-color:#9b4fff"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="#2d2d5e" stroke-width="2"/>

  <!-- Left half — EVM stack (blue) -->
  <!-- Stack layers representing EVM stack-based VM -->
  <rect x="14" y="52" width="44" height="8" rx="2" fill="url(#evm)" opacity="0.9"/>
  <rect x="18" y="44" width="36" height="8" rx="2" fill="url(#evm)" opacity="0.7"/>
  <rect x="22" y="36" width="28" height="8" rx="2" fill="url(#evm)" opacity="0.5"/>
  <rect x="26" y="28" width="20" height="8" rx="2" fill="url(#evm)" opacity="0.3"/>

  <!-- EVM label -->
  <text x="36" y="80" font-family="monospace" font-size="9" font-weight="bold"
        fill="#7ec8ff" text-anchor="middle">REVM</text>
  <text x="36" y="90" font-family="monospace" font-size="6"
        fill="#4a9eff" text-anchor="middle">EVM</text>

  <!-- Divider -->
  <line x1="64" y1="16" x2="64" y2="112" stroke="#404080" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Right half — PVM registers (purple) -->
  <!-- Register file representing RISC-V register-based VM -->
  <!-- r0–r7 register boxes -->
  <g transform="translate(70, 26)">
    <rect x="0"  y="0"  width="16" height="7" rx="1" fill="url(#pvm)" opacity="0.9"/>
    <rect x="20" y="0"  width="16" height="7" rx="1" fill="url(#pvm)" opacity="0.85"/>
    <rect x="0"  y="10" width="16" height="7" rx="1" fill="url(#pvm)" opacity="0.8"/>
    <rect x="20" y="10" width="16" height="7" rx="1" fill="url(#pvm)" opacity="0.75"/>
    <rect x="0"  y="20" width="16" height="7" rx="1" fill="url(#pvm)" opacity="0.65"/>
    <rect x="20" y="20" width="16" height="7" rx="1" fill="url(#pvm)" opacity="0.6"/>
    <rect x="0"  y="30" width="16" height="7" rx="1" fill="url(#pvm)" opacity="0.45"/>
    <rect x="20" y="30" width="16" height="7" rx="1" fill="url(#pvm)" opacity="0.4"/>
    <!-- register labels -->
    <text x="8"  y="5.5" font-family="monospace" font-size="4" fill="#fff" text-anchor="middle">x0</text>
    <text x="28" y="5.5" font-family="monospace" font-size="4" fill="#fff" text-anchor="middle">x1</text>
    <text x="8"  y="15.5" font-family="monospace" font-size="4" fill="#fff" text-anchor="middle">x2</text>
    <text x="28" y="15.5" font-family="monospace" font-size="4" fill="#fff" text-anchor="middle">x3</text>
    <text x="8"  y="25.5" font-family="monospace" font-size="4" fill="#fff" text-anchor="middle">x4</text>
    <text x="28" y="25.5" font-family="monospace" font-size="4" fill="#fff" text-anchor="middle">x5</text>
    <text x="8"  y="35.5" font-family="monospace" font-size="4" fill="#fff" text-anchor="middle">x6</text>
    <text x="28" y="35.5" font-family="monospace" font-size="4" fill="#fff" text-anchor="middle">x7</text>
  </g>

  <!-- PVM label -->
  <text x="92" y="80" font-family="monospace" font-size="9" font-weight="bold"
        fill="#c47eff" text-anchor="middle">PVM</text>
  <text x="92" y="90" font-family="monospace" font-size="6"
        fill="#9b4fff" text-anchor="middle">RISC-V</text>

  <!-- Bottom: "vs" connector with spark -->
  <text x="64" y="106" font-family="monospace" font-size="8" font-weight="bold"
        fill="#888" text-anchor="middle">⇔</text>

  <!-- Outer glow ring -->
  <circle cx="64" cy="64" r="61" fill="none" stroke="#3d3d7a" stroke-width="1" opacity="0.5"/>
</svg>
