name: Build Polkadot Revive Binaries

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                      /usr/share/swift /usr/local/lib/android
          sudo apt-get clean
          df -h

      - name: Checkout polkadot-sdk (shallow)
        uses: actions/checkout@v4
        with:
          repository: paritytech/polkadot-sdk
          path: polkadot-sdk
          fetch-depth: 1

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-revive-${{ hashFiles('polkadot-sdk/Cargo.lock') }}
          restore-keys: cargo-revive-

      - name: Install LLVM, Clang, and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang protobuf-compiler cmake pkg-config libssl-dev
          echo "LIBCLANG_PATH=/usr/lib/llvm-14/lib" >> $GITHUB_ENV
          echo "LLVM_CONFIG_PATH=$(which llvm-config)" >> $GITHUB_ENV

      - name: Use stable Rust (pre-installed)
        run: |
          rustup default stable
          rustup show

      - name: Build revive-dev-node
        working-directory: polkadot-sdk
        run: cargo build -p revive-dev-node --release
        timeout-minutes: 90

      - name: Build pallet-revive-eth-rpc
        working-directory: polkadot-sdk
        run: cargo build -p pallet-revive-eth-rpc --release
        timeout-minutes: 30

      - name: Show binary sizes
        working-directory: polkadot-sdk
        run: |
          ls -lh target/release/revive-dev-node
          ls -lh target/release/pallet-revive-eth-rpc

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: revive-binaries-linux
          path: |
            polkadot-sdk/target/release/revive-dev-node
            polkadot-sdk/target/release/pallet-revive-eth-rpc
          retention-days: 7
