name: Build Polkadot Revive Binaries

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                      /usr/share/swift /usr/local/lib/android
          sudo apt-get clean
          df -h

      - name: Checkout polkadot-sdk (shallow)
        uses: actions/checkout@v4
        with:
          repository: paritytech/polkadot-sdk
          path: polkadot-sdk
          fetch-depth: 1

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-revive-${{ hashFiles('polkadot-sdk/Cargo.lock') }}
          restore-keys: cargo-revive-

      - name: Install LLVM, Clang, and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev libclang-dev clang protobuf-compiler cmake pkg-config libssl-dev

          # Primary: use llvm-config to find the lib directory
          CLANG_LIB=$(llvm-config --libdir 2>/dev/null || true)

          # Fallback: search for any libclang shared library
          # Matches libclang.so, libclang.so.14, libclang-17.so, libclang-18.so.1, etc.
          if [ -z "$CLANG_LIB" ] || [ ! -d "$CLANG_LIB" ]; then
            CLANG_LIB=$(dirname "$(find /usr/lib -name 'libclang*.so*' 2>/dev/null | head -n1)" 2>/dev/null || true)
          fi

          if [ -z "$CLANG_LIB" ] || [ ! -d "$CLANG_LIB" ]; then
            echo "ERROR: Could not find libclang directory"
            echo "Installed clang files:"
            dpkg -L libclang-dev 2>/dev/null || true
            find /usr/lib -name '*clang*' 2>/dev/null || true
            exit 1
          fi

          # clang-sys looks for libclang.so — create symlink if only versioned lib exists
          if [ ! -f "$CLANG_LIB/libclang.so" ]; then
            VERSIONED=$(find "$CLANG_LIB" -maxdepth 1 \( -name 'libclang-*.so' -o -name 'libclang.so.*' \) 2>/dev/null | head -n1)
            if [ -n "$VERSIONED" ]; then
              sudo ln -sf "$VERSIONED" "$CLANG_LIB/libclang.so"
              echo "Created symlink: $CLANG_LIB/libclang.so -> $VERSIONED"
            fi
          fi

          echo "LIBCLANG_PATH=$CLANG_LIB" >> $GITHUB_ENV
          echo "LLVM_CONFIG_PATH=$(which llvm-config)" >> $GITHUB_ENV
          echo "Found libclang at: $CLANG_LIB"
          ls -la "$CLANG_LIB"/libclang* || true
          protoc --version

      - name: Use stable Rust (pre-installed)
        run: |
          rustup default stable
          rustup target add wasm32-unknown-unknown
          rustup show

      - name: Build revive-dev-node
        working-directory: polkadot-sdk
        run: cargo build -p revive-dev-node --release
        timeout-minutes: 120

      - name: Build pallet-revive-eth-rpc
        working-directory: polkadot-sdk
        run: cargo build -p pallet-revive-eth-rpc --release
        timeout-minutes: 60

      - name: Show binary sizes
        working-directory: polkadot-sdk
        run: |
          ls -lh target/release/revive-dev-node
          ls -lh target/release/pallet-revive-eth-rpc

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: revive-binaries-linux
          path: |
            polkadot-sdk/target/release/revive-dev-node
            polkadot-sdk/target/release/pallet-revive-eth-rpc
          retention-days: 7
